<svg fill="none" viewBox="0 0 850 500" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        @keyframes scanline {
          0% { transform: translateY(-10px); }
          100% { transform: translateY(500px); }
        }

        @keyframes flicker {
          0% { opacity: 0.97; }
          50% { opacity: 1; }
          100% { opacity: 0.98; }
        }

        @keyframes blink {
          50% { opacity: 0; }
        }

        .terminal {
          width: 850px;
          height: 500px;
          background: #050505;
          color: #00ff88;
          font-family: Consolas, monospace;
          padding: 35px;
          overflow: hidden;
          position: relative;
          border: 1px solid #00ff88;
          animation: flicker 0.15s infinite;
        }

        .scanline {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 2px;
          background: rgba(0,255,136,0.08);
          animation: scanline 6s linear infinite;
        }

        .title {
          color: #ff00aa;
          font-size: 28px;
          font-weight: bold;
          text-shadow: 0 0 10px #ff00aa;
        }

        .subtitle {
          margin-top: 10px;
          color: #00bbff;
          font-size: 14px;
          letter-spacing: 2px;
        }

        .section {
          margin-top: 35px;
        }

        .section-title {
          color: #ff00aa;
          margin-bottom: 15px;
          font-size: 13px;
          border-left: 4px solid #ff00aa;
          padding-left: 10px;
          text-transform: uppercase;
        }

        .item {
          margin-bottom: 10px;
          font-size: 14px;
        }

        .tag {
          display: inline-block;
          background: #00ff88;
          color: #000;
          padding: 2px 6px;
          margin-right: 10px;
          font-weight: bold;
        }

        .stack {
          margin-top: 35px;
          color: #00bbff;
          font-size: 13px;
          font-weight: bold;
        }

        .terminal-line {
          margin-top: 40px;
          border-top: 1px solid rgba(0,255,136,0.2);
          padding-top: 18px;
          font-size: 14px;
        }

        .cursor {
          display: inline-block;
          width: 10px;
          height: 16px;
          background: #00ff88;
          animation: blink 1s infinite;
          vertical-align: middle;
        }

        .footer {
          position: absolute;
          bottom: 20px;
          width: calc(100% - 70px);
          text-align: center;
          color: rgba(0,255,136,0.35);
          font-size: 11px;
        }
      </style>

      <div class="terminal">
        <div class="scanline"></div>

        <div class="title">SYSTEM_UPLINK // VEIDEV</div>

        <div class="subtitle">
          BUILDING WEB EXPERIENCES &amp; GAME SYSTEMS
        </div>

        <div class="section">
          <div class="section-title">Projects &amp; Focus</div>

          <div class="item">
            <span class="tag">WEB</span>
            Full-stack applications &amp; UI systems
          </div>

          <div class="item">
            <span class="tag">API</span>
            Backend services &amp; automation
          </div>

          <div class="item">
            <span class="tag">DEV</span>
            Game ecosystems &amp; digital systems
          </div>

          <div class="item">
            <span class="tag">OSS</span>
            Open source &amp; custom projects
          </div>
        </div>

        <div class="stack">
          &gt; STACK: TYPESCRIPT | PYTHON | SQL | WEB DEVELOPMENT
        </div>

        <div class="terminal-line">
          <span style="color:#00bbff;">veidev@github:~$</span>
          cat ./README.md
          <br/><br/>
          <span style="color:white;">
            [READY] Profile successfully loaded.
          </span>
          <span class="cursor"></span>
        </div>

        <div class="footer">
          HELLO GITHUB // VEIDEV © 2026
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
