<svg fill="none" viewBox="0 0 850 500" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes scanline { 0% { transform: translateY(0); } 100% { transform: translateY(500px); } }
        @keyframes flicker { 0% { opacity: 0.95; } 5% { opacity: 0.7; } 10% { opacity: 0.95; } 100% { opacity: 1; } }

        .terminal {
          background: #030303;
          color: #00FF41;
          font-family: 'Courier New', Consolas, monospace;
          padding: 30px;
          border: 1px solid #00FF41;
          height: 440px;
          position: relative;
          overflow: hidden;
          box-shadow: inset 0 0 40px rgba(0, 255, 65, 0.05);
          animation: flicker 0.2s infinite;
        }

        .scanline {
          position: absolute; width: 100%; height: 2px;
          background: rgba(0, 255, 65, 0.08);
          z-index: 10; top: 0; left: 0;
          animation: scanline 5s linear infinite;
        }

        .header { color: #ff00ff; font-weight: bold; font-size: 22px; margin-bottom: 2px; text-shadow: 0 0 8px #ff00ff; }
        .sub-header { color: #00bcff; font-size: 14px; margin-bottom: 25px; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .cat-title { color: #ff00ff; font-size: 12px; text-transform: uppercase; border-left: 4px solid #ff00ff; padding-left: 8px; margin-bottom: 12px; }

        .item { font-size: 13px; margin-bottom: 6px; }
        .item span { color: #fff; opacity: 0.9; }

        .lang-stack { color: #00bcff; font-size: 11px; margin-top: 5px; font-weight: bold; }
        .tag { background: #00FF41; color: #000; padding: 0 4px; font-weight: bold; font-size: 10px; margin-right: 6px; }
        .cursor { display: inline-block; width: 10px; height: 16px; background: #00FF41; animation: blink 1s step-end infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        .footer { margin-top: 40px; font-size: 10px; color: rgba(0, 255, 65, 0.4); text-align: center; }
      </style>

      <div class="terminal">
        <div class="scanline"></div>

        <div class="header">SYSTEM_UPLINK // ID: vei</div>
        <div class="sub-header">BUILDING WEB EXPERIENCES & GAME SYSTEMS</div>

        <div class="grid">
          <div class="col">
            <div class="cat-title">Projects &amp; focus</div>
            <div class="item"><span class="tag">WEB</span> <span>Full-stack apps &amp; UI</span></div>
            <div class="item"><span class="tag">API</span> <span>REST / GraphQL services</span></div>
            <div class="item"><span class="tag">DEV</span> <span>CI/CD, Docker, automation</span></div>
            <div class="item"><span class="tag">OSS</span> <span>Repos you contribute to</span></div>
          </div>

          <div class="col">
            <div class="cat-title">Interests</div>
            <div class="item"><span>System design &amp; performance</span></div>
            <div class="item"><span>Security basics</span></div>
            <div class="item"><span>Open source community</span></div>
            <div class="item"><span>Edit this block in banner.svg</span></div>
          </div>
        </div>

        <div class="lang-stack">
          &gt; STACK: TYPESCRIPT | PYTHON | SQL | WEB DEVELOPMENT
        </div>

        <div style="margin-top: 30px; font-size: 13px; border-top: 1px solid rgba(0, 255, 65, 0.2); padding-top: 15px;">
          <span style="color: #00bcff;">h0tk@github:~$</span> cat ./README.md
          <br/>
          <span style="color: #fff;">[READY] Profile loaded.</span> <span class="cursor"></span>
        </div>

        <div class="footer">
          HELLO GITHUB @veidev � 2026
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
